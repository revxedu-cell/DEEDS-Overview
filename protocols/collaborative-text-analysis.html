<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Collaborative Reading — DEEDS Examine Protocol</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>

:root {
  --phase:#0a7a14; --phase-light:#e8f7ea; --phase-mid:#bbf7d0; --phase-dark:#065f0c;
  --amber:#F59E0B; --amber-light:#FEF3C7;
  --text:#072b0a; --text-mid:#3d6b43; --text-soft:#6b9b72;
  --border:#d4ead6; --bg:#f0faf1; --white:#fff;
  --m-ind-bg:#EFF6FF; --m-ind-b:#BFDBFE; --m-ind-t:#1D4ED8;
  --m-pair-bg:#F0FDF4; --m-pair-b:#BBF7D0; --m-pair-t:#15803D;
  --m-sm-bg:#FAF5FF; --m-sm-b:#DDD6FE; --m-sm-t:#6D28D9;
  --m-wh-bg:#FFF7ED; --m-wh-b:#FED7AA; --m-wh-t:#C2410C;
  --t-bg:#072b0a; --t-s:rgba(255,255,255,.06); --t-l:rgba(255,255,255,.09);
  --t-text:rgba(255,255,255,.88); --t-soft:rgba(255,255,255,.55);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Nunito Sans',sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }

/* ── TOPBAR ── */
.topbar {
  position:sticky; top:0; z-index:50; background:white;
  border-bottom:1px solid var(--border);
  padding:9px 20px; display:flex; align-items:center;
  justify-content:space-between; gap:10px; flex-wrap:wrap;
}
.tl { display:flex; align-items:center; gap:9px; }
.back-btn {
  display:inline-flex; align-items:center; gap:5px;
  font-family:'Nunito',sans-serif; font-weight:700; font-size:12px;
  color:var(--text-soft); text-decoration:none; padding:5px 10px 5px 6px;
  border-radius:6px; border:1.5px solid var(--border); background:white; transition:all .15s;
}
.back-btn:hover { border-color:var(--phase); color:var(--phase); }
.phase-pill { font-family:'Nunito',sans-serif; font-weight:900; font-size:11px; letter-spacing:.15em; color:white; background:var(--phase); padding:4px 11px; border-radius:5px; }
.deck-label { font-family:'Nunito',sans-serif; font-weight:700; font-size:13px; color:var(--text-mid); }
.ctrl-area { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.tg { display:flex; background:var(--bg); border-radius:7px; padding:3px; gap:2px; }
.tb { font-family:'Nunito',sans-serif; font-weight:700; font-size:11px; padding:4px 10px; border:none; border-radius:5px; cursor:pointer; background:transparent; color:var(--text-soft); transition:all .15s; }
.tb.active { background:white; color:var(--phase-dark); box-shadow:0 1px 3px rgba(0,0,0,.1); }

/* subject toggle — slightly larger */
.subj-tg { display:flex; background:var(--bg); border-radius:7px; padding:3px; gap:2px; }
.subj-tb { font-family:'Nunito',sans-serif; font-weight:800; font-size:11px; padding:5px 11px; border:none; border-radius:5px; cursor:pointer; background:transparent; color:var(--text-soft); transition:all .15s; white-space:nowrap; }
.subj-tb.active { background:var(--phase); color:white; box-shadow:0 1px 4px rgba(10,122,20,.35); }

/* phase nav — only shown in CR mode */
.phase-nav { display:none; align-items:center; gap:6px; }
body.subj-cr .phase-nav { display:flex; }
body.subj-css .phase-nav { display:flex; }
.nav-btn { width:30px; height:30px; border-radius:6px; border:1.5px solid var(--border); background:white; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-mid); font-size:13px; transition:all .15s; }
.nav-btn:hover:not(:disabled) { border-color:var(--phase); color:var(--phase); }
.nav-btn:disabled { opacity:.3; cursor:not-allowed; }
.slide-ctr { font-family:'Nunito',sans-serif; font-weight:800; font-size:12px; color:var(--text-mid); min-width:54px; text-align:center; white-space:nowrap; }

/* band toggles — hidden for CS/CSS */
.band-tg { display:none; }
body.subj-cr .band-tg,
body.subj-cta .band-tg,
body.subj-css .band-tg { display:flex; }

/* ── PAGE LAYOUT ── */
.page { max-width:1080px; margin:24px auto; padding:0 20px 40px; }

/* subject panels */
.subj-panel { display:none; }
body.subj-cr  .subj-panel.cr  { display:block; }
body.subj-cta .subj-panel.cta { display:block; }
body.subj-css .subj-panel.css { display:block; }

/* CR phase slides */
.cr-slide { display:none; }
.cr-slide.active { display:block; }
.cs-slide { display:none; }
.cs-slide.active { display:block; }
.css-slide { display:none; }
.css-slide.active { display:block; }

/* ── STUDENT CARD ── */
.sc { background:white; border-radius:14px; box-shadow:0 2px 20px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04); overflow:hidden; min-height:520px; display:none; flex-direction:column; }
body.subj-cr.vs  #cr-panel .sc,
body.subj-cta.vs #cs-panel .sc,
body.subj-css.vs #css-panel .sc { display:flex; }

.sh { flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; padding:13px 24px; border-bottom:1px solid #f0f7f1; }
.shl { display:flex; align-items:center; gap:9px; }
.type-badge { font-family:'Nunito',sans-serif; font-weight:800; font-size:10px; letter-spacing:.1em; padding:4px 10px; border-radius:4px; text-transform:uppercase; }
.badge-r { color:#3d6b43; background:var(--phase-light); border:1px solid var(--phase-mid); }
.badge-f { color:var(--phase-dark); background:var(--phase-light); border:1px solid var(--phase-mid); }
.phase-num-badge { font-family:'Nunito',sans-serif; font-weight:900; font-size:10px; letter-spacing:.1em; padding:4px 11px; border-radius:4px; text-transform:uppercase; color:white; background:var(--phase-dark); }
.timer { font-family:'Nunito',sans-serif; font-weight:800; font-size:13.5px; color:var(--text-mid); }

/* band variants */
.bv { display:none; flex-direction:column; flex:1; min-height:0; }
/* scope bv rules to active panel only */
body.subj-cr.bk2  #cr-panel .bv[data-b="k2"],
body.subj-cta.bk2 #cs-panel .bv[data-b="k2"],
body.subj-css.bk2 #css-panel .bv[data-b="k2"]  { display:flex; }
body.subj-cr.b35  #cr-panel .bv[data-b="35"],
body.subj-cta.b35 #cs-panel .bv[data-b="35"],
body.subj-css.b35 #css-panel .bv[data-b="35"]  { display:flex; }
body.subj-cr.b68  #cr-panel .bv[data-b="68"],
body.subj-cta.b68 #cs-panel .bv[data-b="68"],
body.subj-css.b68 #css-panel .bv[data-b="68"]  { display:flex; }
body.subj-cr.b912 #cr-panel .bv[data-b="912"]  { display:flex; }

.sb { flex:1; min-height:0; display:flex; flex-direction:column; padding:18px 24px 14px; }
.s-phase-label { font-family:'Nunito',sans-serif; font-weight:900; font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--phase); margin-bottom:4px; flex-shrink:0; }
.s-title { font-family:'Nunito',sans-serif; font-weight:900; font-size:36px; color:var(--text); line-height:1.05; margin-bottom:5px; flex-shrink:0; }
.s-sub { font-size:16px; font-weight:600; color:var(--text-mid); margin-bottom:14px; flex-shrink:0; }

/* cards row */
.cr { flex:1; min-height:0; display:flex; align-items:stretch; gap:0; }
.cw { flex:1; display:flex; }
.pc { flex:1; border-radius:10px; padding:12px 10px 10px; display:flex; flex-direction:column; align-items:center; text-align:center; gap:5px; overflow:hidden; }
.pd { border:2px dashed var(--phase); }
.pr { border:2px dashed #86efac; background:#f8fff9; }
.card-arrow { flex:0 0 18px; display:flex; align-items:center; justify-content:center; color:var(--phase); font-size:15px; font-weight:900; flex-shrink:0; }
.cm { display:flex; align-items:center; justify-content:space-between; width:100%; }
.mode-pill { font-family:'Nunito',sans-serif; font-weight:800; font-size:11px; letter-spacing:.05em; padding:2px 6px; border-radius:20px; white-space:nowrap; }
.m-ind  { background:var(--m-ind-bg);  border:1px solid var(--m-ind-b);  color:var(--m-ind-t); }
.m-pair { background:var(--m-pair-bg); border:1px solid var(--m-pair-b); color:var(--m-pair-t); }
.m-sm   { background:var(--m-sm-bg);   border:1px solid var(--m-sm-b);   color:var(--m-sm-t); }
.m-wh   { background:var(--m-wh-bg);   border:1px solid var(--m-wh-b);   color:var(--m-wh-t); }
.c-time { font-family:'Nunito',sans-serif; font-weight:700; font-size:10px; color:var(--text-soft); }
.c-icon { font-size:30px; line-height:1; flex-shrink:0; }
.c-label { font-family:'Nunito',sans-serif; font-weight:900; font-size:17px; color:var(--text); flex-shrink:0; }
.c-prompt { font-size:14px; color:var(--text-mid); line-height:1.4; }
.c-starter { font-size:12.5px; color:var(--text-soft); font-style:italic; line-height:1.35; }
.annot-key { display:flex; flex-wrap:wrap; gap:3px; justify-content:center; margin-top:2px; }
.ak { font-family:'Nunito',sans-serif; font-weight:800; font-size:9px; background:#f0f7f1; border:1px solid var(--phase-mid); color:var(--phase-dark); border-radius:4px; padding:2px 5px; }

/* phase stepper dots */
.phase-dots { display:flex; justify-content:center; gap:8px; padding:12px 0 0; }
.phase-dot { width:28px; height:6px; border-radius:3px; background:var(--phase-mid); cursor:pointer; transition:all .2s; }
.phase-dot.active { background:var(--phase); width:36px; }

/* ── TEACHER CARD ── */
.tc2 { background:var(--t-bg); border-radius:14px; box-shadow:0 2px 20px rgba(0,0,0,.2); overflow:hidden; min-height:560px; display:none; flex-direction:column; }
body.vt.subj-cr  #cr-panel .tc2 { display:flex; }
body.vt.subj-cta #cs-panel .tc2 { display:flex; }
body.vt.subj-css #css-panel .tc2 { display:flex; }
.t-hdr { flex:0 0 auto; background:var(--phase); padding:15px 24px; display:flex; align-items:flex-start; justify-content:space-between; gap:14px; }
.t-hdr-l { display:flex; flex-direction:column; gap:3px; }
.t-ey { font-family:'Nunito',sans-serif; font-weight:700; font-size:10px; letter-spacing:.18em; color:rgba(255,255,255,.75); text-transform:uppercase; }
.t-ttl { font-family:'Nunito',sans-serif; font-weight:900; font-size:20px; color:white; }
.t-meta { display:flex; flex-direction:column; align-items:flex-end; gap:2px; background:rgba(0,0,0,.15); border-radius:7px; padding:7px 12px; flex-shrink:0; }
.t-ml { font-family:'Nunito',sans-serif; font-weight:700; font-size:9px; letter-spacing:.12em; color:rgba(255,255,255,.6); text-transform:uppercase; }
.t-mv { font-family:'Nunito',sans-serif; font-weight:800; font-size:12px; color:white; }
.t-body { flex:1; padding:14px 24px 18px; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr auto auto; gap:12px; }
.t-sec { background:var(--t-s); border-radius:9px; padding:12px 13px; overflow:hidden; }
.t-sec-title { font-family:'Nunito',sans-serif; font-weight:900; font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--phase-mid); margin-bottom:8px; }
.h-row { display:flex; align-items:flex-start; gap:8px; padding:6px 0; border-bottom:1px solid var(--t-l); }
.h-row:last-of-type { border-bottom:none; padding-bottom:0; }
.h-badge { flex-shrink:0; background:rgba(10,122,20,.25); border:1px solid rgba(10,122,20,.4); border-radius:5px; padding:3px 6px; text-align:center; min-width:42px; }
.h-d { font-family:'Nunito',sans-serif; font-weight:900; font-size:11.5px; color:#86efac; line-height:1; }
.h-lbl { font-family:'Nunito',sans-serif; font-weight:700; font-size:7px; color:rgba(134,239,172,.7); letter-spacing:.05em; }
.h-name { font-family:'Nunito',sans-serif; font-weight:800; font-size:12px; color:#86efac; margin-bottom:2px; }
.h-rat { font-size:11px; color:var(--t-soft); line-height:1.35; }
.g-row { display:flex; align-items:flex-start; gap:7px; padding:4px 0; border-bottom:1px solid var(--t-l); }
.g-row:last-child { border-bottom:none; padding-bottom:0; }
.g-band { font-family:'Nunito',sans-serif; font-weight:900; font-size:9px; letter-spacing:.08em; color:var(--phase-mid); background:rgba(10,122,20,.18); border-radius:3px; padding:2px 6px; white-space:nowrap; flex-shrink:0; margin-top:1px; }
.g-note { font-size:11px; color:var(--t-soft); line-height:1.4; }
.fac-list { list-style:none; display:flex; flex-direction:column; gap:4px; overflow:auto; }
.fac-list li { font-size:11.5px; color:var(--t-soft); line-height:1.4; padding-left:12px; position:relative; }
.fac-list li::before { content:'›'; position:absolute; left:0; color:var(--phase-mid); font-weight:900; }
.why-box { grid-column:1/-1; border-left:3px solid var(--phase-mid); background:rgba(10,122,20,.1); border-radius:0 9px 9px 0; padding:10px 13px; }
.why-l { font-family:'Nunito',sans-serif; font-weight:900; font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--phase-mid); margin-bottom:3px; }
.why-t { font-size:12.5px; color:var(--t-text); line-height:1.55; }
.std-row { grid-column:1/-1; display:flex; align-items:flex-start; gap:8px; padding-top:9px; border-top:1px solid var(--t-l); }
.std-l { font-family:'Nunito',sans-serif; font-weight:900; font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--phase-mid); white-space:nowrap; padding-top:1px; }
.std-v { font-size:11px; color:var(--t-soft); line-height:1.45; }

/* ── PLACEHOLDER PANEL ── */
.placeholder-panel { background:white; border-radius:14px; box-shadow:0 2px 20px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04); padding:48px 40px; display:flex; flex-direction:column; align-items:center; text-align:center; gap:16px; }
.ph-icon { font-size:48px; }
.ph-title { font-family:'Nunito',sans-serif; font-weight:900; font-size:24px; color:var(--text); }
.ph-sub { font-size:15px; color:var(--text-mid); max-width:420px; line-height:1.55; }
.ph-tag { font-family:'Nunito',sans-serif; font-weight:800; font-size:11px; letter-spacing:.12em; color:var(--text-soft); background:var(--phase-light); border:1px solid var(--phase-mid); padding:4px 12px; border-radius:20px; }

@media print {
  .topbar { display:none; }
  .page { margin:0; padding:0; max-width:100%; }
  .cr-slide { display:block !important; page-break-after:always; }
  .cs-slide { display:block !important; page-break-after:always; }
  .sc,.tc2 { display:flex !important; box-shadow:none; border-radius:0; }
  body.vs .tc2, body.vt .sc { display:none !important; }
}
</style>
</head>
<body class="vs bk2 subj-cr">

<div class="topbar">
  <div class="tl">
    <a class="back-btn" href="../examine.html">&#8592; Examine</a>
    <span class="phase-pill">EXAMINE</span>
    <span class="deck-label" id="deck-label">Collaborative Reading</span>
  </div>
  <div class="ctrl-area">

    <!-- Subject toggle -->
    <div class="subj-tg">
      <button class="subj-tb active" id="bscr"  onclick="setSubject('cr')">Reading</button>
      <button class="subj-tb"        id="bscs"  onclick="setSubject('cs')">Science</button>
      <button class="subj-tb"        id="bscss" onclick="setSubject('css')">Social Studies</button>
    </div>

    <!-- Phase nav — CR only -->
    <div class="phase-nav" id="phase-nav">
      <button class="nav-btn" id="prev-btn" onclick="prevPhase()" disabled>&#8592;</button>
      <span class="slide-ctr" id="slide-ctr">Phase 1 of 5</span>
      <button class="nav-btn" id="next-btn" onclick="nextPhase()">&#8594;</button>
    </div>

    <!-- Student / Teacher -->
    <div class="tg">
      <button class="tb active" id="bvs" onclick="setView('s')">Student</button>
      <button class="tb"        id="bvt" onclick="setView('t')">Teacher</button>
    </div>

    <!-- Grade band -->
    <div class="tg band-tg">
      <button class="tb active" id="bbk2" onclick="setBand('k2')">K–2</button>
      <button class="tb"        id="bb35" onclick="setBand('35')">3–5</button>
      <button class="tb"        id="bb68" onclick="setBand('68')">6–8</button>
    </div>
  </div>
</div>

<div class="page">

  <!-- ══ COLLABORATIVE READING PANEL ══ -->
  <div class="subj-panel cr" id="cr-panel"></div>

  <!-- ══ COLLABORATIVE SCIENCE PANEL ══ -->
  <div class="subj-panel cta" id="cs-panel"></div>

  <!-- ══ COLLABORATIVE SOCIAL STUDIES PANEL ══ -->
  <div class="subj-panel css" id="css-panel"></div>

</div><!-- /page -->

<script>
const CR_PHASES = [

{
  num:1, name:`What's the Main Idea?`, label:`Phase 1 · Main Idea`,
  timer:{ k2:'15 min', '35':'15 min', '68':'10 min' },
  purpose:{
    k2:`Listen, read, and think together: What is this text mostly about?`,
    '35':`Read, choose a strategy, and prove the main idea with evidence from the text.`,
    '68':`Read independently. What is the central idea, and how does the author develop it?`
  },
  bands:{
    k2:[
      { mode:`whole`,      time:`3–4 min`, icon:`📖`, label:`Read Together — Twice`,
        prompt:`Follow along as the text is read aloud. Then the class reads together.`,
        annot:['accuracy','rate','expression','punctuation'] },
      { mode:`individual`, time:`2 min`,   icon:`🧠`, label:`Think Time`,
        prompt:`Use a strategy to determine the main idea. Circle key details that support it.`,
        starter:`I used the [strategy] strategy. The text is mostly about…` },
      { mode:`whole`,      time:`2–3 min`, icon:`💬`, label:`Share Your Thinking`,
        prompt:`Flash your participation card. State your answer and tell us where you found evidence.`,
        starter:`The text is mainly about… I know because…` }
    ],
    '35':[
      { mode:`whole`,      time:`5–6 min`, icon:`🎵`, label:`Read Twice — Fluency Check`,
        prompt:`Class reads the text twice. Complete the Fluency Checklist.`,
        annot:['accuracy','rate','expression','punctuation'] },
      { mode:`individual`, time:`2–3 min`, icon:`🔍`, label:`Choose a Strategy & Annotate`,
        prompt:`Pick a main idea strategy. Annotate key details (KD) and use POE on the choices.`,
        annot:['title','WHO / WHAT','repeated ideas','first/last sentence','visual aids'] },
      { mode:`whole`,      time:`3 min`,   icon:`💬`, label:`Defend Your Answer`,
        prompt:`Flash your card. State your answer, which strategy you used, and exactly where your evidence appears.`,
        starter:`The central idea is… I used the [strategy] strategy because… Evidence: paragraph…` }
    ],
    '68':[
      { mode:`whole`,      time:`2 min`,   icon:`📖`, label:`Introduce`,
        prompt:`Introduce title, genre, and key vocabulary. What do you already know about this topic? What might complicate your thinking?` },
      { mode:`individual`, time:`3 min`,   icon:`📖`, label:`First Read`,
        prompt:`Read independently for gist. Don't annotate yet — just read.` },
      { mode:`individual`, time:`3 min`,   icon:`🔍`, label:`Identify the Central Idea`,
        prompt:`Read again. What is the central idea? How does the author develop it across the text?`,
        starter:`The central idea is… The author develops this by… The detail that made me most certain was…` },
      { mode:`whole`,      time:`2 min`,   icon:`💬`, label:`Share`,
        prompt:`State the central idea and your strongest support. Be specific about where in the text you found it.`,
        starter:`The central idea is… I know because in paragraph… the author…` }
    ]
  },
  teacher:{
    obj:`Students identify the main or central idea of the text and distinguish it from supporting details.`,
    grade:{
      k2:`Scribe student responses on a class circle map. Accept oral responses. Model strategies explicitly — especially WHO/WHAT. If a student selects a detail as the main idea, prompt: "Does the author mention this throughout the whole text, or just once?"`,
      '35':`Students should know the strategies; push them to articulate which strategy they used and why. Watch for the common misconception: a detail that appears in a strong paragraph is not the main idea. Process of Elimination is a key skill to coach here.`,
      '68':`Students don't need choral reading — two independent reads are sufficient. Push beyond identification to how and why the author develops the central idea. Phase 1 questions should require synthesis, not just locating a stated idea.`
    },
    notes:[
      `Introduce only one or two strategies at a time for K–1; build the full strategy set progressively across the year.`,
      `The think time observation window is your formative data: note who is annotating, who is using POE, and who needs coaching.`,
      `If most of the class selects the wrong answer, treat it as a teaching moment — don't simply reveal the answer. Ask: "What details from the text support that choice?"`,
      `For grades 2+, require students to name their strategy when sharing, not just their answer.`
    ],
    why:`The main idea is the backbone of the text. Without it, students cannot organize details, make connections across phases, or write a coherent Phase 5 synthesis. Phase 1 sets the lens through which students read everything that follows.`,
    std:`CCSS RI.2 · RI.3 · SL.1`
  }
},

{
  num:2, name:`Making Our Thinking Visible`, label:`Phase 2 · Annotation`,
  timer:{ k2:'15 min', '35':'15 min', '68':'10 min' },
  purpose:{
    k2:`Use one annotation marking to show your thinking. Where in this text is the most important information?`,
    '35':`Annotate with multiple markings and notes. Show your thinking so you can use it as evidence later.`,
    '68':`Read and annotate. Show your thinking — not just what you marked, but why it matters.`
  },
  bands:{
    k2:[
      { mode:`whole`,      time:`3–4 min`, icon:`📋`, label:`Introduce & Read Together`,
        prompt:`Review the annotation marking focus for today. Then read the text twice chorally.`,
        annot:['⭐ important info','🧑 text-self connection','❓ question','F fact','KD key detail'] },
      { mode:`whole`,      time:`2–3 min`, icon:`🖊️`, label:`Watch the Think-Aloud`,
        prompt:`Watch the think-aloud. Which marking is used? Why does it go on that part of the text?` },

const MC = { individual:'m-ind', pair:'m-pair', small:'m-sm', whole:'m-wh' };
const ML = { individual:'✏️\u202FIndividual', pair:'👥\u202FPartner', small:'◎\u202FSmall Group', whole:'◎\u202FWhole Class' };

function buildCard(step) {
  const mc = MC[step.mode] || 'm-wh';
  const ml = ML[step.mode] || step.mode;
  const starter = step.starter ? `<div class="c-starter">${step.starter}</div>` : '';
  const annotKey = step.annot ? `<div class="annot-key">${step.annot.map(a=>`<span class="ak">${a}</span>`).join('')}</div>` : '';
  return `<div class="cw"><div class="pc pr">
    <div class="cm"><span class="mode-pill ${mc}">${ml}</span><span class="c-time">⏳\u202F${step.time}</span></div>
    <div class="c-icon">${step.icon}</div>
    <div class="c-label">${step.label}</div>
    <div class="c-prompt">${step.prompt}</div>
    ${annotKey}${starter}
  </div></div>`;
}

function bvSlot(ph, band) {
  const steps = ph.bands[band];
  if(!steps) return '';
  const cards = steps.map((s,i)=>buildCard(s)+(i<steps.length-1?'<div class="card-arrow">›</div>':'')).join('');
  return `<div class="bv" data-b="${band}">
    <div class="sb">
      <div class="s-phase-label">${ph.label}</div>
      <div class="s-title">${ph.name}</div>
      <div class="s-sub">${ph.purpose[band] || ph.purpose['35']}</div>
      <div class="cr">${cards}</div>
    </div>
  </div>`;
}

function buildTeacherCard(ph, subject) {
  const t = ph.teacher;
  const gKeys = [{k:'k2',l:'K\u20132'},{k:'35',l:'3\u20135'},{k:'68',l:'6\u20138'}];
  const grows = gKeys.map(g=>`<div class="g-row"><span class="g-band">${g.l}</span><span class="g-note">${t.grade[g.k]||''}</span></div>`).join('');
  const facNotes = t.notes.map(n=>`<li>${n}</li>`).join('');
  return `<div class="tc2">
    <div class="t-hdr">
      <div class="t-hdr-l">
        <div class="t-ey">Teacher Background — ${subject}</div>
        <div class="t-ttl">${ph.label}</div>
      </div>
      <div class="t-meta">
        <div class="t-ml">Objective</div>
        <div class="t-mv" style="font-size:10px;max-width:170px;text-align:right;line-height:1.3">${t.obj}</div>
      </div>
    </div>
    <div class="t-body">
      <div class="t-sec"><div class="t-sec-title">Grade Band Guidance</div>${grows}</div>
      <div class="t-sec"><div class="t-sec-title">Facilitation Notes</div><ul class="fac-list">${facNotes}</ul></div>
      <div class="why-box"><div class="why-l">Why this phase, why now</div><div class="why-t">${t.why}</div></div>
      <div class="std-row"><div class="std-l">Standards</div><div class="std-v">${t.std}</div></div>
    </div>
  </div>`;
}

function buildSlide(ph, idx, subject, slideClass, panelPrefix) {
  return `
  <div class="${slideClass}${idx===0?' active':''}" data-idx="${idx}">
    <div class="sc">
      <div class="sh">
        <div class="shl">
          <span class="phase-pill">EXAMINE</span>
          <span class="phase-num-badge">Phase ${ph.num}</span>
          <span class="type-badge badge-r">${subject}</span>
        </div>
        <div class="timer" id="${panelPrefix}tmr${idx}">⏱\u202F${ph.timer['k2']}</div>
      </div>
      ${bvSlot(ph,'k2')}${bvSlot(ph,'35')}${bvSlot(ph,'68')}
    </div>
    ${buildTeacherCard(ph, subject)}
    <div class="phase-dots" id="${panelPrefix}dots${idx}"></div>
  </div>`;
}

function buildPanel(phases, panelId, subject, slideClass, panelPrefix) {
  const panel = document.getElementById(panelId);
  panel.innerHTML = phases.map((ph,i) => buildSlide(ph, i, subject, slideClass, panelPrefix)).join('');
  const dotsHTML = phases.map((_,i)=>`<div class="phase-dot" id="${panelPrefix}dot${i}" onclick="goToPhase(${i})"></div>`).join('');
  document.querySelectorAll(`[id^="${panelPrefix}dots"]`).forEach(el => { el.innerHTML = dotsHTML; });
}

function getConfig() {
  const b = document.body;
  if(b.classList.contains('subj-cta')) return { phases:CS_PHASES,  panelId:'cs-panel',  slideClass:'cs-slide',  prefix:'cs',  subject:'Collaborative Science',       nav:updateNav };
  if(b.classList.contains('subj-css')) return { phases:CSS_PHASES, panelId:'css-panel', slideClass:'css-slide', prefix:'css', subject:'Collaborative Social Studies', nav:updateNav };
  return { phases:CR_PHASES, panelId:'cr-panel', slideClass:'cr-slide', prefix:'cr', subject:'Collaborative Reading', nav:updateNav };
}

let currentPhase = 0;

function goToPhase(idx) {
  const { panelId, slideClass, nav } = getConfig();
  document.querySelectorAll(`#${panelId} .${slideClass}`).forEach(s => s.classList.remove('active'));
  const t = document.querySelector(`#${panelId} .${slideClass}[data-idx="${idx}"]`);
  if(t) t.classList.add('active');
  currentPhase = idx;
  updateNav();
}

function prevPhase() { if(currentPhase > 0) goToPhase(currentPhase - 1); }
function nextPhase() {
  const { phases } = getConfig();
  if(currentPhase < phases.length - 1) goToPhase(currentPhase + 1);
}

function updateNav() {
  const { phases, panelId } = getConfig();
  document.getElementById('prev-btn').disabled = currentPhase === 0;
  document.getElementById('next-btn').disabled = currentPhase === phases.length - 1;
  document.getElementById('slide-ctr').textContent = `Phase ${currentPhase + 1} of ${phases.length}`;
  document.querySelectorAll(`#${panelId} .phase-dot`).forEach((d,i) => d.classList.toggle('active', i === currentPhase));
  const band = document.body.className.match(/\bb(\w+)\b/)?.[1] || 'k2';
  const cfg = getConfig();
  const tmr = document.getElementById(`${cfg.prefix}tmr${currentPhase}`);
  if(tmr) tmr.textContent = '\u23F1\u202F' + (cfg.phases[currentPhase].timer[band] || cfg.phases[currentPhase].timer['k2']);
}

function setSubject(s) {
  document.body.className = document.body.className.replace(/\bsubj-\w+\b/g,'').trim()
    + ' subj-' + (s==='cs' ? 'cta' : s==='css' ? 'css' : 'cr');
  ['cr','cs','css'].forEach(x => {
    const btn = document.getElementById('bs'+x);
    if(btn) btn.classList.toggle('active', x===s);
  });
  const labels = { cr:'Collaborative Reading', cs:'Collaborative Science', css:'Collaborative Social Studies' };
  document.getElementById('deck-label').textContent = labels[s] || 'Collaborative Reading';
  const showNav = true;
  document.getElementById('phase-nav').style.display = 'flex';
  currentPhase = 0;
  updateNav();
}

function setView(v) {
  document.body.classList.toggle('vs', v==='s');
  document.body.classList.toggle('vt', v==='t');
  document.getElementById('bvs').classList.toggle('active', v==='s');
  document.getElementById('bvt').classList.toggle('active', v==='t');
}

function setBand(b) {
  document.body.className = document.body.className.replace(/\bb\w+\b/g,'').trim() + ' b' + b;
  ['k2','35','68'].forEach(x => {
    const btn = document.getElementById('bb'+x);
    if(btn) btn.classList.toggle('active', x===b);
  });
  updateNav();
}

document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight') nextPhase();
  if(e.key==='ArrowLeft')  prevPhase();
});

// Build all panels on load
buildPanel(CR_PHASES,  'cr-panel',  'Collaborative Reading',       'cr-slide',  'cr');
buildPanel(CS_PHASES,  'cs-panel',  'Collaborative Science',       'cs-slide',  'cs');
buildPanel(CSS_PHASES, 'css-panel', 'Collaborative Social Studies', 'css-slide', 'css');
updateNav();

</script>
</body>
</html>
