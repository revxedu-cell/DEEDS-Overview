<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEEDS Discover — Protocol Slides</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --phase:#F97316; --phase-light:#FFF7ED; --phase-mid:#FED7AA; --phase-dark:#C2410C;
  --amber:#F59E0B; --amber-light:#FEF3C7;
  --text:#1C1917; --text-mid:#44403C; --text-soft:#78716C;
  --border:#E7E5E4; --bg:#F5F4F2; --white:#fff;
  --m-ind-bg:#EFF6FF;  --m-ind-b:#BFDBFE;  --m-ind-t:#1D4ED8;
  --m-pair-bg:#F0FDF4; --m-pair-b:#BBF7D0; --m-pair-t:#15803D;
  --m-sm-bg:#FAF5FF;   --m-sm-b:#DDD6FE;   --m-sm-t:#6D28D9;
  --m-wh-bg:#FFF7ED;   --m-wh-b:#FED7AA;   --m-wh-t:#C2410C;
  --t-bg:#1C1917; --t-s:rgba(255,255,255,.06); --t-l:rgba(255,255,255,.09);
  --t-text:rgba(255,255,255,.88); --t-soft:rgba(255,255,255,.55);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Nunito Sans',sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }

/* ── TOPBAR ── */
.topbar {
  position:sticky; top:0; z-index:50; background:white;
  border-bottom:1px solid var(--border);
  padding:9px 20px; display:flex; align-items:center;
  justify-content:space-between; gap:12px; flex-wrap:wrap;
}
.tl { display:flex; align-items:center; gap:9px; }
.phase-pill {
  font-family:'Nunito',sans-serif; font-weight:900; font-size:13px;
  letter-spacing:.15em; color:white; background:var(--phase);
  padding:5px 13px; border-radius:5px;
}
.deck-label { font-family:'Nunito',sans-serif; font-weight:700; font-size:13px; color:var(--text-mid); }
.nav-area { display:flex; align-items:center; gap:9px; }
.nav-btn {
  width:32px; height:32px; border-radius:7px; border:1.5px solid var(--border);
  background:white; cursor:pointer; display:flex; align-items:center;
  justify-content:center; color:var(--text-mid); font-size:14px; transition:all .15s;
}
.nav-btn:hover:not(:disabled) { border-color:var(--phase); color:var(--phase); }
.nav-btn:disabled { opacity:.3; cursor:not-allowed; }
.slide-ctr { font-family:'Nunito',sans-serif; font-weight:800; font-size:13px; color:var(--text-mid); min-width:40px; text-align:center; }
.ctrl-area { display:flex; align-items:center; gap:8px; }
.tg { display:flex; background:var(--bg); border-radius:7px; padding:3px; gap:2px; }
.tb {
  font-family:'Nunito',sans-serif; font-weight:700; font-size:11px;
  padding:4px 10px; border:none; border-radius:5px; cursor:pointer;
  background:transparent; color:var(--text-soft); transition:all .15s;
}
.tb.active { background:white; color:var(--phase-dark); box-shadow:0 1px 3px rgba(0,0,0,.1); }

/* ── PAGE LAYOUT ── */
.page { max-width:1400px; margin:24px auto; padding:0 20px 40px; }
.slide { display:none; }
.slide.active { display:block; }

/* ── STUDENT CARD (fixed slide dimensions) ── */
.sc {
  background:white; border-radius:14px;
  box-shadow:0 2px 20px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.04);
  overflow:hidden;
  aspect-ratio:16/9;     /* scales with screen width for projection */
  min-height:480px;
  display:none;
  flex-direction:column;
}
body.vs .sc { display:flex; }

/* slide header */
.sh {
  flex:0 0 auto;
  display:flex; align-items:center; justify-content:space-between;
  padding:13px 24px; border-bottom:1px solid #F5F5F4;
}
.shl { display:flex; align-items:center; gap:9px; }
.type-badge {
  font-family:'Nunito',sans-serif; font-weight:800; font-size:12px;
  letter-spacing:.1em; padding:5px 12px; border-radius:4px; text-transform:uppercase;
}
.badge-r { color:#92400E; background:var(--amber-light); border:1px solid #FDE68A; }
.badge-f { color:var(--phase-dark); background:var(--phase-light); border:1px solid var(--phase-mid); }
.timer { font-family:'Nunito',sans-serif; font-weight:800; font-size:18px; color:var(--text-mid); }

/* band variants — only active band visible */
.bv { display:none; flex-direction:column; flex:1; min-height:0; }
body.bk2 .bv[data-b="k2"]  { display:flex; }
body.b35  .bv[data-b="35"] { display:flex; }
body.b612 .bv[data-b="612"]{ display:flex; }

/* slide body */
.sb {
  flex:1; min-height:0;
  display:flex; flex-direction:column;
  padding:18px 24px 10px;
}
.s-title {
  font-family:'Nunito',sans-serif; font-weight:900; font-size:40px;
  color:var(--text); line-height:1.1; margin-bottom:6px; flex-shrink:0;
}
.s-sub {
  font-size:19px; font-weight:600; color:var(--text-mid);
  margin-bottom:16px; flex-shrink:0;
}

/* ── CARDS ROW — equal height is the key constraint ── */
.cr {
  flex:1; min-height:0;
  display:flex; align-items:stretch; /* <-- all cards stretch to same height */
}
.cw { flex:1; display:flex; }
.pc {
  flex:1;
  border-radius:10px;
  padding:14px 12px 12px;
  display:flex; flex-direction:column;
  align-items:center; text-align:center;
  gap:7px;
  overflow:hidden;
}
/* routine = muted dashes; focus = orange dashes */
.pd { border:2px dashed var(--phase); }
.pr { border:2px dashed #FDBA74; background:#FFFCF9; }

.card-arrow {
  flex:0 0 20px; display:flex; align-items:center; justify-content:center;
  color:var(--phase); font-size:16px; font-weight:900; flex-shrink:0;
}

/* card internals */
.cm { display:flex; align-items:center; justify-content:space-between; width:100%; }
.mode-pill {
  font-family:'Nunito',sans-serif; font-weight:800; font-size:12px;
  letter-spacing:.05em; padding:3px 9px; border-radius:20px; white-space:nowrap;
}
.m-ind  { background:var(--m-ind-bg);  border:1px solid var(--m-ind-b);  color:var(--m-ind-t); }
.m-pair { background:var(--m-pair-bg); border:1px solid var(--m-pair-b); color:var(--m-pair-t); }
.m-sm   { background:var(--m-sm-bg);   border:1px solid var(--m-sm-b);   color:var(--m-sm-t); }
.m-wh   { background:var(--m-wh-bg);   border:1px solid var(--m-wh-b);   color:var(--m-wh-t); }
.c-time { font-family:'Nunito',sans-serif; font-weight:700; font-size:13px; color:var(--text-soft); }
.c-icon { font-size:34px; line-height:1; flex-shrink:0; }
.c-label {
  font-family:'Nunito',sans-serif; font-weight:900; font-size:20px; color:var(--text);
  flex-shrink:0;
}
.c-prompt { font-size:17px; color:var(--text-mid); line-height:1.4; }
.c-starter { font-size:15px; color:var(--text-soft); font-style:italic; line-height:1.35; }

/* ── TEACHER CARD (fixed slide dimensions) ── */
.tc2 {
  background:var(--t-bg); border-radius:14px;
  box-shadow:0 2px 20px rgba(0,0,0,.2);
  overflow:hidden;
  aspect-ratio:16/9;      /* scales with screen width for projection */
  min-height:500px;
  display:none;
  flex-direction:column;
}
body.vt .tc2 { display:flex; }

.t-hdr {
  flex:0 0 auto;
  background:var(--phase); padding:15px 24px;
  display:flex; align-items:flex-start; justify-content:space-between; gap:14px;
}
.t-hdr-l { display:flex; flex-direction:column; gap:3px; }
.t-ey {
  font-family:'Nunito',sans-serif; font-weight:700; font-size:10px;
  letter-spacing:.18em; color:rgba(255,255,255,.75); text-transform:uppercase;
}
.t-ttl { font-family:'Nunito',sans-serif; font-weight:900; font-size:20px; color:white; }
.t-meta {
  display:flex; flex-direction:column; align-items:flex-end; gap:2px;
  background:rgba(0,0,0,.15); border-radius:7px; padding:7px 12px; flex-shrink:0;
}
.t-ml { font-family:'Nunito',sans-serif; font-weight:700; font-size:10px; letter-spacing:.12em; color:rgba(255,255,255,.6); text-transform:uppercase; }
.t-mv { font-family:'Nunito',sans-serif; font-weight:800; font-size:13px; color:white; }

.t-body {
  flex:1; min-height:0;
  padding:14px 24px 18px;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr auto auto;
  gap:12px;
}
.t-sec { background:var(--t-s); border-radius:9px; padding:12px 13px; overflow:hidden; }
.t-sec-title {
  font-family:'Nunito',sans-serif; font-weight:900; font-size:9.5px;
  letter-spacing:.14em; text-transform:uppercase; color:var(--phase); margin-bottom:8px;
}

/* hattie rows */
.h-row {
  display:flex; align-items:flex-start; gap:8px;
  padding:6px 0; border-bottom:1px solid var(--t-l);
}
.h-row:last-of-type { border-bottom:none; padding-bottom:0; }
.h-badge {
  flex-shrink:0; background:rgba(249,115,22,.18); border:1px solid rgba(249,115,22,.35);
  border-radius:5px; padding:3px 6px; text-align:center; min-width:42px;
}
.h-d { font-family:'Nunito',sans-serif; font-weight:900; font-size:13px; color:#FED7AA; line-height:1; }
.h-lbl { font-family:'Nunito',sans-serif; font-weight:700; font-size:8px; color:rgba(249,115,22,.7); letter-spacing:.05em; }
.h-name { font-family:'Nunito',sans-serif; font-weight:800; font-size:13px; color:#FED7AA; margin-bottom:2px; }
.h-rat { font-size:12px; color:var(--t-soft); line-height:1.35; }

/* grade notes */
.g-row {
  display:flex; align-items:flex-start; gap:7px;
  padding:4px 0; border-bottom:1px solid var(--t-l);
}
.g-row:last-child { border-bottom:none; padding-bottom:0; }
.g-band {
  font-family:'Nunito',sans-serif; font-weight:900; font-size:9px; letter-spacing:.08em;
  color:var(--phase); background:rgba(249,115,22,.12); border-radius:3px;
  padding:2px 6px; white-space:nowrap; flex-shrink:0; margin-top:1px;
}
.g-note { font-size:12px; color:var(--t-soft); line-height:1.4; }

/* planning note */
.plan-note {
  background:rgba(255,255,255,.04); border:1px solid var(--t-l);
  border-radius:7px; padding:8px 11px;
}
.plan-title { font-family:'Nunito',sans-serif; font-weight:900; font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,.4); margin-bottom:4px; }
.plan-txt { font-size:12px; color:var(--t-soft); line-height:1.4; }

/* why now — spans both columns */
.why-box {
  grid-column:1/-1;
  border-left:3px solid var(--phase); background:rgba(249,115,22,.09);
  border-radius:0 9px 9px 0; padding:10px 13px;
}
.why-l { font-family:'Nunito',sans-serif; font-weight:900; font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--phase); margin-bottom:3px; }
.why-t { font-size:13px; color:var(--t-text); line-height:1.55; }

/* standards row */
.std-row {
  grid-column:1/-1;
  display:flex; align-items:flex-start; gap:8px;
  padding-top:9px; border-top:1px solid var(--t-l);
}
.std-l { font-family:'Nunito',sans-serif; font-weight:900; font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--phase); white-space:nowrap; padding-top:1px; }
.std-v { font-size:12px; color:var(--t-soft); line-height:1.45; }

/* ── PRINT ── */
@media print {
  .topbar { display:none; }
  .page { margin:0; padding:0; max-width:100%; }
  .slide { display:block !important; page-break-after:always; }
  .sc, .tc2 { display:flex !important; box-shadow:none; border-radius:0; }
  body.vs .tc2, body.vt .sc { display:none !important; }
}
</style>
</head>
<body class="vs bk2">

<div class="topbar">
  <div class="tl">
    <span class="phase-pill">DISCOVER</span>
    <span class="deck-label">Protocol Slides</span>
  </div>
  <div class="nav-area">
    <button class="nav-btn" id="pb" onclick="nav(-1)" disabled>&#8592;</button>
    <span class="slide-ctr" id="ctr">1 / 6</span>
    <button class="nav-btn" id="nb" onclick="nav(1)">&#8594;</button>
  </div>
  <div class="ctrl-area">
    <div class="tg">
      <button class="tb active" id="bvs" onclick="setView('s')">Student</button>
      <button class="tb"        id="bvt" onclick="setView('t')">Teacher</button>
    </div>
    <div class="tg">
      <button class="tb active" id="bbk2"  onclick="setBand('k2')">K–2</button>
      <button class="tb"        id="bb35"   onclick="setBand('35')">3–5</button>
      <button class="tb"        id="bb612"  onclick="setBand('612')">6–12</button>
    </div>
  </div>
</div>

<div class="page" id="slides"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────

const BANDS = ['k2','35','612'];
const BL    = { k2:'K\u20132', '35':'3\u20135', '612':'6\u201312' };

// mode → css class + label
const MC = { individual:'m-ind', pair:'m-pair', small:'m-sm', whole:'m-wh' };
const ML = { individual:'\u270F\uFE0F\u202FIndividual', pair:'\uD83D\uDC65\u202FPartner', small:'\u25CE\u202FSmall Group', whole:'\u25CE\u202FWhole Class' };

const P = [

/* ══════════════════════════════════════════════════════════
   1. NOTICE & WONDER  (routine)
   ══════════════════════════════════════════════════════════ */
{
  id:'nw', type:'routine', name:'Notice & Wonder',
  timer: { k2:'3\u20134 min', '35':'3\u20135 min', '612':'4\u20135 min' },
  purpose: {
    k2:   'Look at today\u2019s focus. Draw or write what you see \u2014 then share.',
    '35': 'Look at today\u2019s focus. Write first, then share with a partner.',
    '612':'Observe carefully. Separate what you see from what you infer. Then discuss.'
  },
  bands: {
    k2: [
      { mode:'individual', time:'1\u20132 min', icon:'\uD83D\uDCDD', label:'Draw & Write',
        prompt:'Draw what you see. Write any words you can.',
        starter:'I see\u2026 / I wonder\u2026' },
      { mode:'pair', time:'1 min', icon:'\uD83D\uDC65', label:'Tell a Partner',
        prompt:'Share what you drew or wrote. Add to each other\u2019s ideas.',
        starter:'' },
      { mode:'whole', time:'1 min', icon:'\uD83D\uDCAC', label:'Share Out',
        prompt:'Share one thing you noticed or wondered that we haven\u2019t heard yet.',
        starter:'' }
    ],
    '35': [
      { mode:'individual', time:'1\u20132 min', icon:'\uD83D\uDCDD', label:'Notice & Note',
        prompt:'Write silently before sharing anything.',
        starter:'One thing I notice is\u2026 / One question I have is\u2026' },
      { mode:'pair', time:'1\u20132 min', icon:'\uD83D\uDC65', label:'Partner Talk',
        prompt:'Take turns. Add to your partner\u2019s thinking \u2014 don\u2019t just repeat yours.',
        starter:'' },
      { mode:'whole', time:'1 min', icon:'\uD83D\uDCAC', label:'Class Harvest',
        prompt:'Share one idea or question the class hasn\u2019t heard yet.',
        starter:'' }
    ],
    '612': [
      { mode:'individual', time:'1\u20132 min', icon:'\uD83D\uDCDD', label:'Observe & Annotate',
        prompt:'Record observations only. Flag where you feel the urge to interpret \u2014 and hold back.',
        starter:'' },
      { mode:'individual', time:'1 min', icon:'\uD83D\uDD0D', label:'Layer Questions',
        prompt:'What do you genuinely not know? What question would most change your understanding?',
        starter:'' },
      { mode:'small', time:'2 min', icon:'\u25CE', label:'Group Synthesis',
        prompt:'Share one precise observation and one strong question each. Choose the strongest from the group to share.',
        starter:'' }
    ]
  },
  teacher: {
    when:'Daily, to open each session', type:'Daily Routine',
    hattie: [
      { d:'0.64', n:'Self-Questioning',        r:'Student-generated questions improve comprehension and retention across disciplines.' },
      { d:'0.60', n:'Metacognitive Strategies', r:'Separating observation from interpretation slows cognition and reduces premature conclusions.' },
      { d:'0.65', n:'Prior Knowledge Activation',r:'Connecting new stimuli to existing schema before instruction improves encoding.' }
    ],
    principal: null,
    grade: {
      k2:   'Teacher scribes on a shared chart. Drawing accepted alongside writing. Revisit the chart at the start of each session to show knowledge building.',
      '35': 'Post a sentence frame chart. Students who struggle with writing can draw first, then label.',
      '68': 'Push back actively if students interpret during the observation step: \u201cThat\u2019s a claim \u2014 what do you actually see?\u201d',
      '912':'The quality of student questions in step 2 predicts the quality of Data Dive claims. Hold the bar high.'
    },
    planning: 'When choosing the daily Notice/Wonder focus, select an image, artifact, or data display that surfaces the challenge without explaining it. Complexity should increase across sessions: open images (Session 2) \u2192 data with patterns (Session 3) \u2192 contradictory sources (Session 4).',
    why: 'Grounds students in the challenge before deep work begins. Repeated daily use builds the observational precision that strengthens Data Dive evidence claims and sharpens problem framing in Uncovering the Challenge.',
    std:'NGSS SEP 1 \u00b7 C3 D1 \u00b7 CCSS SL.1, RI.1'
  }
},

/* ══════════════════════════════════════════════════════════
   2. THINK, FEEL, ACT  (focus) — always 3 steps
   ══════════════════════════════════════════════════════════ */
{
  id:'tfa', type:'focus', name:'Think, Feel, Act',
  timer: { k2:'8\u201310 min', '35':'8\u201312 min', '612':'8\u201312 min' },
  purpose: {
    k2:   'What did we see? How does it make us feel? What could we do?',
    '35': 'Write your thoughts and feelings about the challenge. Then share what you\u2019d do.',
    '612':'Separate what you think from what you feel. Then decide what action that leads to.'
  },
  bands: {
    k2: [
      { mode:'whole', time:'2 min', icon:'\uD83E\uDDE0', label:'Think',
        prompt:'What did we see or hear? Teacher charts responses.',
        starter:'I saw\u2026 / I heard\u2026' },
      { mode:'whole', time:'2\u20133 min', icon:'\u2764\uFE0F', label:'Feel',
        prompt:'How does it make you feel? Point to a word or picture on the chart.',
        starter:'I feel\u2026' },
      { mode:'whole', time:'2\u20133 min', icon:'\u270A', label:'Act',
        prompt:'What could we do to help?',
        starter:'We could\u2026' }
    ],
    '35': [
      { mode:'individual', time:'2\u20133 min', icon:'\uD83E\uDDE0', label:'Think',
        prompt:'What did you observe or learn? What stands out?',
        starter:'I noticed\u2026 / I learned\u2026' },
      { mode:'individual', time:'2\u20133 min', icon:'\u2764\uFE0F', label:'Feel',
        prompt:'What emotions came up? What surprised you?',
        starter:'I feel\u2026 because\u2026' },
      { mode:'pair', time:'2\u20133 min', icon:'\u270A', label:'Act',
        prompt:'What would you want to do about this? Tell your partner.',
        starter:'One thing I could do is\u2026' }
    ],
    '612': [
      { mode:'individual', time:'2\u20133 min', icon:'\uD83E\uDDE0', label:'Think',
        prompt:'What do you think about this challenge, based on what you observed? Be specific.',
        starter:'' },
      { mode:'individual', time:'2\u20133 min', icon:'\u2764\uFE0F', label:'Feel',
        prompt:'What is your emotional response \u2014 and why specifically? Push past the first word.',
        starter:'' },
      { mode:'small', time:'3\u20134 min', icon:'\u270A', label:'Act',
        prompt:'What do you want to do \u2014 and why? Share your answer, then push each other: is this based on evidence or assumption?',
        starter:'' }
    ]
  },
  teacher: {
    when:'Session 1, after the Immersive Experience', type:'Focus Protocol',
    hattie: [
      { d:'1.33', n:'Student Expectations',     r:'When students connect personally to a problem and see themselves as capable of contributing, achievement increases significantly.' },
      { d:'0.60', n:'Metacognitive Strategies',  r:'Naming cognitive and emotional responses separately builds self-awareness that sustains motivation through harder work.' },
      { d:'0.57', n:'Social-Emotional Learning', r:'Emotional regulation positively impacts academic performance and engagement in cognitively demanding tasks.' }
    ],
    principal: null,
    grade: {
      k2:   'Use an emotions chart or emoji cards for the Feel step. Accept drawn responses. Whole-class works better than pairs at this age.',
      '35': 'Model the Think and Feel steps yourself before students write. Students often conflate thinking and feeling \u2014 show the difference explicitly.',
      '68': 'Press students past first-level emotional responses: \u201csad\u201d or \u201cangry\u201d is a starting point, not an ending point.',
      '912':'In the Act step, hold students accountable for distinguishing evidence-based from assumption-based reactions before deciding on action.'
    },
    planning: null,
    why: 'The Discover continuum requires students to articulate purpose and significance \u2014 why this problem matters and why they should act. That capacity is emotional before it is analytical. Push students: \u201cI feel sad\u201d needs to become \u201cI feel responsible because\u2026\u201d',
    std:'NGSS SEP 1 \u00b7 C3 D2.Civ \u00b7 CCSS SL.1, W.9'
  }
},

/* ══════════════════════════════════════════════════════════
   3. BRIDGING PERSPECTIVES  (focus)
   ══════════════════════════════════════════════════════════ */
{
  id:'bp', type:'focus', name:'Bridging Perspectives',
  timer: { k2:'8\u201310 min', '35':'8\u201312 min', '612':'10\u201312 min' },
  purpose: {
    k2:   'Use your card to meet someone affected by this challenge. What do they care about?',
    '35': 'Read your perspective card. Speak in role, then look for what\u2019s similar and different.',
    '612':'Construct the perspective on your card fully. Then analyze where tensions come from.'
  },
  bands: {
    k2: [
      { mode:'whole', time:'2 min', icon:'\uD83C\uDFAD', label:'Meet Your Person',
        prompt:'Teacher reads the card aloud. Who is this person? What do they care about?',
        starter:'' },
      { mode:'pair', time:'3\u20134 min', icon:'\uD83D\uDDE3\uFE0F', label:'Speak Up',
        prompt:'Tell your partner what your person thinks or feels about this situation.',

// ── RENDER FUNCTIONS ────────────────────────────────────────────────────

function buildCard(step, isRoutine) {
  const dc  = isRoutine ? 'pr' : 'pd';
  const mc  = MC[step.mode] || 'm-wh';
  const ml  = ML[step.mode] || step.mode;
  const str = step.starter
    ? `<div class="c-starter">${step.starter}</div>` : '';
  return `<div class="cw"><div class="pc ${dc}">
    <div class="cm">
      <span class="mode-pill ${mc}">${ml}</span>
      <span class="c-time">\u23F3\u202F${step.time}</span>
    </div>
    <div class="c-icon">${step.icon}</div>
    <div class="c-label">${step.label}</div>
    <div class="c-prompt">${step.prompt}</div>
    ${str}
  </div></div>`;
}

function buildBand(proto, band) {
  const ir    = proto.type === 'routine';
  let   cards = '';
  proto.bands[band].forEach((s, i) => {
    cards += buildCard(s, ir);
    if (i < proto.bands[band].length - 1)
      cards += `<div class="card-arrow">\u203A</div>`;
  });
  return `<div class="bv" data-b="${band}">
    <div class="sb">
      <div class="s-title">${proto.name}</div>
      <div class="s-sub">${proto.purpose[band]}</div>
      <div class="cr">${cards}</div>
    </div>
  </div>`;
}

function buildTeacher(proto) {
  const t = proto.teacher;

  const hattiRows = t.hattie.map(h => `<div class="h-row">
    <div class="h-badge"><div class="h-d">d=${h.d}</div><div class="h-lbl">Hattie</div></div>
    <div><div class="h-name">${h.n}</div><div class="h-rat">${h.r}</div></div>
  </div>`).join('');

  const gradeRows = [
    { key:'k2', label:'K\u20132' }, { key:'35', label:'3\u20135' },
    { key:'68', label:'6\u20138' }, { key:'912', label:'9\u201312' }
  ].map(g => `<div class="g-row">
    <span class="g-band">${g.label}</span>
    <span class="g-note">${t.grade[g.key]}</span>
  </div>`).join('');

  const planNote = t.planning ? `<div class="plan-note">
    <div class="plan-title">Planning Notes</div>
    <div class="plan-txt">${t.planning}</div>
  </div>` : '';

  return `<div class="tc2">
    <div class="t-hdr">
      <div class="t-hdr-l">
        <div class="t-ey">Teacher Background \u2014 Discover</div>
        <div class="t-ttl">${proto.name}</div>
      </div>
      <div class="t-meta">
        <div class="t-ml">When to use</div><div class="t-mv">${t.when}</div>
        <div class="t-ml" style="margin-top:4px">Type</div><div class="t-mv">${t.type}</div>
      </div>
    </div>
    <div class="t-body">
      <div class="t-sec">
        <div class="t-sec-title">Hattie Effect Sizes</div>
        ${hattiRows}
      </div>
      <div class="t-sec">
        <div class="t-sec-title">Grade Band Guidance</div>
        ${gradeRows}
        ${planNote}
      </div>
      <div class="why-box">
        <div class="why-l">Why this, why now</div>
        <div class="why-t">${t.why}</div>
      </div>
      <div class="std-row">
        <div class="std-l">Standards</div>
        <div class="std-v">${t.std}</div>
      </div>
    </div>
  </div>`;
}

function buildAll() {
  let html = '';
  P.forEach((proto, i) => {
    const ir = proto.type === 'routine';
    const bc = ir ? 'badge-r' : 'badge-f';
    const bl = ir ? 'Daily Routine' : 'Focus Protocol';
    const bvs = BANDS.map(b => buildBand(proto, b)).join('');
    html += `<div class="slide${i === 0 ? ' active' : ''}" data-i="${i}">
      <div class="sc">
        <div class="sh">
          <div class="shl">
            <span class="phase-pill">DISCOVER</span>
            <span class="type-badge ${bc}">${bl}</span>
          </div>
          <div class="timer" id="tmr${i}">\u23F1\u202F${proto.timer['k2']}</div>
        </div>
        ${bvs}
      </div>
      ${buildTeacher(proto)}
    </div>`;
  });
  document.getElementById('slides').innerHTML = html;
}

buildAll();

// ── NAVIGATION ──────────────────────────────────────────────────────────
let cur = 0;
const TOT = P.length;

function nav(d) {
  document.querySelector('.slide.active').classList.remove('active');
  cur = Math.max(0, Math.min(TOT - 1, cur + d));
  document.querySelector(`.slide[data-i="${cur}"]`).classList.add('active');
  document.getElementById('ctr').textContent = (cur + 1) + ' / ' + TOT;
  document.getElementById('pb').disabled = cur === 0;
  document.getElementById('nb').disabled = cur === TOT - 1;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── VIEW TOGGLE ─────────────────────────────────────────────────────────
function setView(v) {
  document.body.classList.toggle('vs', v === 's');
  document.body.classList.toggle('vt', v === 't');
  document.getElementById('bvs').classList.toggle('active', v === 's');
  document.getElementById('bvt').classList.toggle('active', v === 't');
}

// ── BAND TOGGLE ─────────────────────────────────────────────────────────
function setBand(b) {
  // remove old band class, add new
  document.body.className = document.body.className
    .replace(/\bb(k2|35|612)\b/g, '').trim() + ' b' + b;
  BANDS.forEach(x =>
    document.getElementById('bb' + x).classList.toggle('active', x === b)
  );
  // update timers
  P.forEach((proto, i) => {
    const el = document.getElementById('tmr' + i);
    if (el) el.textContent = '\u23F1\u202F' + (proto.timer[b] || proto.timer['35']);
  });
}

// ── KEYBOARD ────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nav(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   nav(-1);
  if (e.key === 's') setView('s');
  if (e.key === 't') setView('t');
});
</script>
