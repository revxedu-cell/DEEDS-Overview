<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DEEDS — A Framework for Learning That Matters</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  /* Phase colors */
  --discover:#e69138;
  --examine:#0a9b19;
  --engineer:#003da6;
  --do:#ffb600;
  --share:#ab0a3d;

  /* Additional palette */
  --accent-red:#e7004d;
  --accent-cyan:#00aac8;
  --accent-yellow:#ffd100;
  --accent-blue-mid:#416ba9;
  --accent-blue-deep:#194f90;
  --accent-navy:#001f61;
  --accent-teal:#007197;
  --accent-green:#46c850;

  /* Neutrals / UI */
  --bg:#fff9f4;
  --surface:#fff;
  --border:rgba(0,31,97,.1);
  --text:#1a1a2e;
  --text-muted:#5a5a7a;
  --radius:12px;
}

html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;color:var(--text);background:var(--bg);line-height:1.6;overflow-x:hidden}
.dm{font-family:'DM Serif Display',serif}


/* ── Nav ── */
.nav{
  position:sticky;top:0;z-index:100;
  background:rgba(255,249,244,.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 24px;
}
.nav-in{
  max-width:1200px;margin:0 auto;
  display:flex;align-items:center;gap:4px;
  overflow-x:auto;scrollbar-width:none;
  padding:9px 0;
}
.nav-in::-webkit-scrollbar{display:none}
.nb{
  white-space:nowrap;
  padding:9px 18px;border-radius:8px;
  border:none;background:none;
  font-family:inherit;font-size:13px;font-weight:600;
  color:var(--text-muted);
  cursor:pointer;transition:all .2s;
  text-decoration:none;display:inline-block;
}
.nb:hover{background:rgba(0,31,97,.06);color:var(--text)}
.nb.active{background:var(--accent-navy);color:#fff}
.nb.disabled{
  color:var(--text-muted);opacity:.45;
  cursor:not-allowed;pointer-events:none;
}
.nb-phase{
  display:inline-flex;align-items:center;gap:6px;
}
.nb-dot{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;
}
.nb-soon{
  font-size:9px;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;
  background:rgba(0,31,97,.07);
  color:var(--text-muted);
  border-radius:4px;padding:1px 5px;
  vertical-align:middle;
}


/* ── Hero ── */
#hero{}


/* ── Phase Pentagon ── */
#pentagon{}


/* ── Community Challenge ── */
#community-challenge{}


/* ── Challenge Question ── */
#challenge-question{}


/* ── Get Started ── */
#get-started{}

</style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <div class="nav-in">
    <a href="index.html" class="nb active">Home</a>
    <a href="plan.html" class="nb">Plan Your Unit</a>
    <a href="discover.html" class="nb nb-phase">
      <span class="nb-dot" style="background:var(--discover)"></span>Discover
    </a>
    <span class="nb nb-phase disabled">
      <span class="nb-dot" style="background:var(--examine)"></span>Examine
      <span class="nb-soon">Soon</span>
    </span>
    <span class="nb nb-phase disabled">
      <span class="nb-dot" style="background:var(--engineer)"></span>Engineer
      <span class="nb-soon">Soon</span>
    </span>
    <span class="nb nb-phase disabled">
      <span class="nb-dot" style="background:var(--do)"></span>Do
      <span class="nb-soon">Soon</span>
    </span>
    <span class="nb nb-phase disabled">
      <span class="nb-dot" style="background:var(--share)"></span>Share
      <span class="nb-soon">Soon</span>
    </span>
  </div>
</nav>

<!-- Hero -->
<section id="hero"></section>

<!-- Phase Pentagon -->
<section id="pentagon"></section>

<!-- Finding Your Community Challenge -->
<section id="community-challenge"></section>

<!-- Crafting Your Challenge Question -->
<section id="challenge-question"></section>

<!-- Get Started -->
<section id="get-started"></section>

</body>
</html>
